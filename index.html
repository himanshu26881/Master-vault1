<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasterVault</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2ce57f">

<link rel="icon" type="image/png" href="icon-192.png">

</head>

<body>

<div class="login-container">

    <div class="login-card card">

        <!-- LOGO (FIXED) -->
        <div class="logo">
            <img src="icon-192.png" class="logo-img" alt="logo">
            <h2>MasterVault</h2>
            <p class="subtitle">Secure your passwords smartly</p>
        </div>

        <!-- SIGNUP -->
        <form id="setup-form">
            <h3>Create Account</h3>

            <div class="floating-group">
                <input type="email" id="email" required>
                <label>Email</label>
            </div>

            <div class="floating-group">
                <input type="password" id="new-master" required>
                <label>Password</label>
                <i class="fa-solid fa-eye toggle-pass"></i>
            </div>

            <button class="btn primary-btn">Sign Up</button>
        </form>

        <div class="divider">OR</div>

        <!-- LOGIN -->
        <form id="login-form">
            <h3>Login</h3>

            <div class="floating-group">
                <input type="email" id="email-login" required>
                <label>Email</label>
            </div>

            <div class="floating-group">
                <input type="password" id="master-password" required>
                <label>Password</label>
                <i class="fa-solid fa-eye toggle-pass"></i>
            </div>

            <button class="btn primary-btn">Login</button>
            <button type="button" id="forgot-btn" class="text-link">
    Forgot Password?
</button>

        </form>

    </div>
</div>

<script type="module" src="script.js"></script>

<script>
document.querySelectorAll(".toggle-pass").forEach(icon => {
    icon.addEventListener("click", () => {
        const input = icon.parentElement.querySelector("input");

        input.type = input.type === "password" ? "text" : "password";
        icon.classList.toggle("fa-eye-slash");
    });
});
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log("Service Worker Registered"));
}
</script>

</body>
</html>
